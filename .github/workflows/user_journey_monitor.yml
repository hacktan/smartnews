name: User Journey Monitor

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  user-journey:
    name: Playwright Live User Journey
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      FRONTEND_BASE_URL: https://frontend-chi-brown-98.vercel.app
      API_BASE_URL: https://smartnews-api.onrender.com

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run user journey test
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-live-report
          path: |
            frontend/playwright-report
            frontend/test-results

      - name: Create incident issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Monitor] User journey failure';
            const now = new Date().toISOString();
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'monitor,incident,e2e',
              per_page: 50,
            });

            const body = [
              `Playwright live user journey failed at ${now}.`,
              '',
              `Run: ${runUrl}`,
              '',
              'Artifacts: playwright-live-report',
            ].join('\n');

            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['monitor', 'incident', 'e2e'],
              });
            }
